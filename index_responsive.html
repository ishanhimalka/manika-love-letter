
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Open My Heart</title>
<style>
*{box-sizing:border-box}
html,body{
  margin:0;
  width:100%;
  min-height:100%;
  overflow:hidden;
  font-family:Arial,sans-serif;
}
body{
  min-height:100dvh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:radial-gradient(circle at top,#ffd1dc,#ff4f8b 45%,#2b0a2e);
  color:white;
}
.screen{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:24px;
  transition:1s;
  z-index:10;
}
.hidden{opacity:0;pointer-events:none;transform:scale(.95)}
.start-title{
  font-size:clamp(2rem,10vw,4rem);
  margin-bottom:24px;
  text-shadow:0 0 25px rgba(255,255,255,.8);
  animation:pulse 1.6s infinite;
}
button{
  border:none;
  padding:16px 28px;
  border-radius:50px;
  background:white;
  color:#ff2f78;
  font-size:clamp(17px,4vw,22px);
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 10px 35px rgba(0,0,0,.25);
  animation:buttonGlow 1.8s infinite;
}
.envelope-wrap{
  width:100%;
  height:100dvh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:1s;
  padding:20px;
  transform:translateY(20px);
}
.envelope-wrap.show{
  opacity:1;
  pointer-events:auto;
  transform:translateY(0);
}
.tap-text{
  margin-bottom:28px;
  font-size:clamp(18px,4vw,22px);
  text-shadow:0 0 15px rgba(255,255,255,.7);
}
.envelope{
  --w:min(78vw,320px);
  --h:calc(var(--w) * .68);
  position:relative;
  width:var(--w);
  height:var(--h);
  cursor:pointer;
  perspective:1000px;
  margin-top:80px;
}
.base{
  position:absolute;
  inset:0;
  background:#fff;
  border-radius:12px;
  box-shadow:0 18px 45px rgba(0,0,0,.3);
  z-index:1;
}
.flap{
  position:absolute;
  top:0;
  left:0;
  width:0;
  height:0;
  border-left:calc(var(--w) / 2) solid transparent;
  border-right:calc(var(--w) / 2) solid transparent;
  border-top:calc(var(--h) * .55) solid #f8c8d2;
  transform-origin:top;
  transition:1s;
  z-index:5;
}
.side-left{
  position:absolute;
  bottom:0;
  left:0;
  width:0;
  height:0;
  border-bottom:calc(var(--h) * .52) solid #ffe6ec;
  border-right:calc(var(--w) / 2) solid transparent;
  z-index:4;
}
.side-right{
  position:absolute;
  bottom:0;
  right:0;
  width:0;
  height:0;
  border-bottom:calc(var(--h) * .52) solid #ffe6ec;
  border-left:calc(var(--w) / 2) solid transparent;
  z-index:4;
}
.letter{
  position:absolute;
  left:6%;
  right:6%;
  bottom:8%;
  height:82%;
  background:white;
  border-radius:12px;
  padding:16px 14px;
  text-align:center;
  color:#333;
  transform:translateY(35%);
  transition:1.2s;
  z-index:2;
  box-shadow:0 8px 25px rgba(0,0,0,.18);
  overflow:hidden;
}
.open .flap{
  transform:rotateX(180deg);
  z-index:0;
}
.open .letter{
  transform:translateY(-78%);
  z-index:6;
}
h2{
  color:#ff2f78;
  margin:0 0 10px;
  font-size:clamp(20px,5vw,28px);
}
#typed{
  font-size:clamp(14px,3.6vw,18px);
  line-height:1.45;
  margin:0;
}
.cursor{
  display:inline-block;
  width:2px;
  height:18px;
  background:#ff2f78;
  animation:blink .8s infinite;
}
.heart{
  position:fixed;
  bottom:-30px;
  font-size:24px;
  animation:floatUp linear forwards;
  pointer-events:none;
  z-index:1;
}
@media(max-height:650px){
  .tap-text{margin-bottom:10px}
  .envelope{--w:min(70vw,280px);margin-top:60px}
  .open .letter{transform:translateY(-68%)}
  #typed{font-size:13px}
}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes buttonGlow{0%,100%{box-shadow:0 0 20px rgba(255,255,255,.6)}50%{box-shadow:0 0 45px rgba(255,255,255,1)}}
@keyframes blink{50%{opacity:0}}
@keyframes floatUp{
  from{transform:translateY(0) rotate(0deg);opacity:0}
  15%{opacity:1}
  to{transform:translateY(-110vh) rotate(360deg);opacity:0}
}
</style>
</head>
<body>

<div id="startScreen" class="screen">
  <div class="start-title">For You, Manika ❤️</div>
  <button id="openBtn">Open My Heart</button>
</div>

<div id="envelopeWrap" class="envelope-wrap">
  <div class="tap-text">Tap the envelope 💌</div>
  <div id="env" class="envelope">
    <div class="base"></div>
    <div class="flap"></div>
    <div class="letter">
      <h2>I Love You ❤️</h2>
      <p id="typed"></p><span id="cursor" class="cursor"></span>
    </div>
    <div class="side-left"></div>
    <div class="side-right"></div>
  </div>
</div>

<script>
const startScreen=document.getElementById("startScreen");
const openBtn=document.getElementById("openBtn");
const envelopeWrap=document.getElementById("envelopeWrap");
const env=document.getElementById("env");
const typed=document.getElementById("typed");
const cursor=document.getElementById("cursor");

const message="Manika, every moment with you feels special. You are my happiness, my peace, and my favorite person. I love you so much. ❤️";
let alreadyTyped=false;

openBtn.onclick=()=>{
  startScreen.classList.add("hidden");
  envelopeWrap.classList.add("show");
  makeHearts(25);
};

env.onclick=()=>{
  env.classList.add("open");
  makeHearts(45);
  if(!alreadyTyped){
    alreadyTyped=true;
    setTimeout(typeMessage,900);
  }
};

function typeMessage(){
  let i=0;
  typed.innerHTML="";
  const timer=setInterval(()=>{
    typed.innerHTML+=message.charAt(i);
    i++;
    if(i>=message.length){
      clearInterval(timer);
      cursor.style.display="none";
    }
  },55);
}

function makeHearts(count){
  const hearts=["❤️","💖","💕","💗","💘"];
  for(let i=0;i<count;i++){
    const h=document.createElement("div");
    h.className="heart";
    h.textContent=hearts[Math.floor(Math.random()*hearts.length)];
    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(16+Math.random()*24)+"px";
    h.style.animationDuration=(4+Math.random()*4)+"s";
    h.style.animationDelay=Math.random()*1.5+"s";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),7000);
  }
}
</script>

</body>
</html>
